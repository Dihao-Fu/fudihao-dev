<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>制造智能平台</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <style>
        body { font-family: Arial; background: #f5f7fa; padding: 20px; }
        .chart-container { background: white; padding: 20px; margin: 20px; border-radius: 8px; }
        .chart { width: 100%; height: 300px; }
    </style>
</head>
<body>
    <h1>🏭 制造智能平台</h1>
    
    <div class="chart-container">
        <h3>设备温度监控</h3>
        <div id="chart1" class="chart"></div>
    </div>
    
    <div class="chart-container">
        <h3>产品质量分布</h3>
        <div id="chart2" class="chart"></div>
    </div>

    <script>
        // 图表1
        const chart1 = echarts.init(document.getElementById('chart1'));
        chart1.setOption({
            xAxis: { data: ['设备01', '设备02', '设备03', '设备04', '设备05'] },
            yAxis: {},
            series: [{ 
                type: 'bar', 
                data: [24.5, 26.3, 28.1, 22.8, 25.6],
                name: '平均温度'
            }]
        });

        // 图表2
        const chart2 = echarts.init(document.getElementById('chart2'));
        chart2.setOption({
            series: [{
                type: 'pie',
                data: [
                    { value: 452, name: 'A级' },
                    { value: 315, name: 'B级' },
                    { value: 168, name: 'C级' }
                ]
            }]
        });
    </script>
</body>
</html>
